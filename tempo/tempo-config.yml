server:
  http_listen_port: 3300
  grpc_listen_port: 9096
  log_level: info

# Required on AWS/single-node — Tempo cannot auto-detect advertise IP otherwise
memberlist:
  bind_addr:
    - 127.0.0.1
  advertise_addr: 127.0.0.1

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 720h  # 30 days

storage:
  trace:
    backend: local
    local:
      path: /var/lib/tempo/blocks
    wal:
      path: /var/lib/tempo/wal

querier: {}
