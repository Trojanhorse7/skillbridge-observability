server:
  http_listen_port: 9080

positions:
  filename: /tmp/promtail-positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:

  # ── PM2: production backend ──────────────────────────────────────────────────
  - job_name: skillbridge-api-prod
    static_configs:
      - targets: [localhost]
        labels:
          job: skillbridge-api
          environment: production
          service: backend
          __path__: __PM2_LOGS_DIR__/__PM2_APP_NAME_PROD__-out*.log
    pipeline_stages:
      - multiline:
          firstline: '^\{'
          max_wait_time: 3s
      - json:
          expressions:
            level: level
      - labels:
          level:
      - match:
          selector: '{level="error"}'
          stages:
            - labels:
                error: "true"

  - job_name: skillbridge-api-prod-errors
    static_configs:
      - targets: [localhost]
        labels:
          job: skillbridge-api
          environment: production
          service: backend
          log_type: error
          level: error
          __path__: __PM2_LOGS_DIR__/__PM2_APP_NAME_PROD__-error*.log
    pipeline_stages:
      - multiline:
          firstline: '^\{|^\d{4}-\d{2}-\d{2}|\[.*\]'
          max_wait_time: 3s
      - json:
          expressions:
            level: level
      - labels:
          level:

  # ── PM2: staging backend ─────────────────────────────────────────────────────
  - job_name: skillbridge-api-staging
    static_configs:
      - targets: [localhost]
        labels:
          job: skillbridge-api
          environment: staging
          service: backend
          __path__: __PM2_LOGS_DIR__/__PM2_APP_NAME_STAGING__-out*.log
    pipeline_stages:
      - multiline:
          firstline: '^\{'
          max_wait_time: 3s
      - json:
          expressions:
            level: level
      - labels:
          level:

  - job_name: skillbridge-api-staging-errors
    static_configs:
      - targets: [localhost]
        labels:
          job: skillbridge-api
          environment: staging
          service: backend
          log_type: error
          level: error
          __path__: __PM2_LOGS_DIR__/__PM2_APP_NAME_STAGING__-error*.log
    pipeline_stages:
      - multiline:
          firstline: '^\{|^\d{4}-\d{2}-\d{2}|\[.*\]'
          max_wait_time: 3s
      - json:
          expressions:
            level: level
      - labels:
          level:

  # ── PM2: question-generator (one-shot cron job) ──────────────────────────────
  - job_name: question-generator
    static_configs:
      - targets: [localhost]
        labels:
          job: question-generator
          environment: production
          service: question-generator
          __path__: __PM2_LOGS_DIR__/question-generator-out*.log
    pipeline_stages:
      - multiline:
          firstline: '^\{|^\d{4}-\d{2}-\d{2}|\[.*\]'
          max_wait_time: 3s
      - json:
          expressions:
            level: level
      - labels:
          level:

  - job_name: question-generator-errors
    static_configs:
      - targets: [localhost]
        labels:
          job: question-generator
          environment: production
          service: question-generator
          log_type: error
          level: error
          __path__: __PM2_LOGS_DIR__/question-generator-error*.log
    pipeline_stages:
      - multiline:
          firstline: '^\{|^\d{4}-\d{2}-\d{2}|\[.*\]'
          max_wait_time: 3s
      - json:
          expressions:
            level: level
      - labels:
          level:
