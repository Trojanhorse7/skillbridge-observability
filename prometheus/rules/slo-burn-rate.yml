groups:
  - name: skillbridge.slo
    interval: 60s
    rules:

      # ── Recording rules ───────────────────────────────────────────────────────
      - record: job:http_requests_total:rate5m
        expr: sum(rate(http_requests_total{job="skillbridge-api"}[5m])) by (job, status)

      - record: job:http_request_errors:ratio5m
        expr: |
          sum(rate(http_requests_total{job="skillbridge-api", status=~"5.."}[5m])) by (job)
          /
          sum(rate(http_requests_total{job="skillbridge-api"}[5m])) by (job)

      - record: job:http_request_errors:ratio30m
        expr: |
          sum(rate(http_requests_total{job="skillbridge-api", status=~"5.."}[30m])) by (job)
          /
          sum(rate(http_requests_total{job="skillbridge-api"}[30m])) by (job)

      - record: job:http_request_errors:ratio1h
        expr: |
          sum(rate(http_requests_total{job="skillbridge-api", status=~"5.."}[1h])) by (job)
          /
          sum(rate(http_requests_total{job="skillbridge-api"}[1h])) by (job)

      - record: job:http_request_errors:ratio6h
        expr: |
          sum(rate(http_requests_total{job="skillbridge-api", status=~"5.."}[6h])) by (job)
          /
          sum(rate(http_requests_total{job="skillbridge-api"}[6h])) by (job)

      # ── Error Rate SLO (99% success) ──────────────────────────────────────────
      - alert: SLOFastBurn
        expr: |
          job:http_request_errors:ratio1h{job="skillbridge-api"} > (14.4 * 0.01)
          and
          job:http_request_errors:ratio5m{job="skillbridge-api"} > (14.4 * 0.01)
        for: 2m
        labels:
          severity: critical
          service: skillbridge
          slo: error-rate
        annotations:
          summary: "SLO fast burn: high error rate on SkillBridge API"
          description: "Error rate is {{ printf \"%.2f\" $value | humanizePercentage }} — burning error budget 14.4× faster than allowed."
          dashboard_url: "http://localhost:3200/d/slo-error-budget/skillbridge-slo-error-budget"
          runbook_url: "https://github.com/hng14/skillbridge/blob/main/observability/runbooks/slo-fast-burn.md"

      - alert: SLOSlowBurn
        expr: |
          job:http_request_errors:ratio6h{job="skillbridge-api"} > (5 * 0.01)
          and
          job:http_request_errors:ratio30m{job="skillbridge-api"} > (5 * 0.01)
        for: 15m
        labels:
          severity: warning
          service: skillbridge
          slo: error-rate
        annotations:
          summary: "SLO slow burn: elevated error rate on SkillBridge API"
          description: "Error rate is {{ printf \"%.2f\" $value | humanizePercentage }} — burning error budget 5× faster than allowed."
          dashboard_url: "http://localhost:3200/d/slo-error-budget/skillbridge-slo-error-budget"
          runbook_url: "https://github.com/hng14/skillbridge/blob/main/observability/runbooks/slo-slow-burn.md"

      # ── Availability SLO (99.5% uptime) ──────────────────────────────────────
      - alert: AvailabilityFastBurn
        expr: |
          avg_over_time(probe_success{job="blackbox-http"}[1h]) < 0.995
          and
          avg_over_time(probe_success{job="blackbox-http"}[5m]) < 0.995
        for: 2m
        labels:
          severity: critical
          service: skillbridge
          slo: availability
        annotations:
          summary: "Availability SLO fast burn for {{ $labels.instance }}"
          description: "1h availability {{ printf \"%.2f\" $value | humanizePercentage }} is below 99.5% SLO."
          dashboard_url: "http://localhost:3200/d/slo-error-budget/skillbridge-slo-error-budget"
          runbook_url: "https://github.com/hng14/skillbridge/blob/main/observability/runbooks/slo-fast-burn.md"

      - alert: AvailabilitySlowBurn
        expr: avg_over_time(probe_success{job="blackbox-http"}[6h]) < 0.995
        for: 15m
        labels:
          severity: warning
          service: skillbridge
          slo: availability
        annotations:
          summary: "Availability SLO slow burn for {{ $labels.instance }}"
          description: "6h availability {{ printf \"%.2f\" $value | humanizePercentage }} is below 99.5% SLO."
          dashboard_url: "http://localhost:3200/d/slo-error-budget/skillbridge-slo-error-budget"
          runbook_url: "https://github.com/hng14/skillbridge/blob/main/observability/runbooks/slo-slow-burn.md"

      # ── Latency SLO (95% requests < 500ms) ───────────────────────────────────
      - alert: LatencyFastBurn
        expr: |
          (
            sum(rate(http_request_duration_seconds_bucket{job="skillbridge-api",le="0.5"}[1h]))
            /
            sum(rate(http_request_duration_seconds_count{job="skillbridge-api"}[1h]))
          ) < 0.95
        for: 2m
        labels:
          severity: critical
          service: skillbridge
          slo: latency
        annotations:
          summary: "Latency SLO fast burn on SkillBridge API"
          description: "Only {{ printf \"%.1f\" $value | humanizePercentage }} of requests complete in <500ms (SLO: 95%)."
          dashboard_url: "http://localhost:3200/d/slo-error-budget/skillbridge-slo-error-budget"
          runbook_url: "https://github.com/hng14/skillbridge/blob/main/observability/runbooks/slo-fast-burn.md"

      - alert: LatencySlowBurn
        expr: |
          (
            sum(rate(http_request_duration_seconds_bucket{job="skillbridge-api",le="0.5"}[6h]))
            /
            sum(rate(http_request_duration_seconds_count{job="skillbridge-api"}[6h]))
          ) < 0.95
        for: 15m
        labels:
          severity: warning
          service: skillbridge
          slo: latency
        annotations:
          summary: "Latency SLO slow burn on SkillBridge API"
          description: "Only {{ printf \"%.1f\" $value | humanizePercentage }} of requests complete in <500ms (SLO: 95%)."
          dashboard_url: "http://localhost:3200/d/slo-error-budget/skillbridge-slo-error-budget"
          runbook_url: "https://github.com/hng14/skillbridge/blob/main/observability/runbooks/slo-slow-burn.md"
