groups:
  - name: skillbridge.infrastructure
    interval: 15s
    rules:

      # ── CPU ──────────────────────────────────────────────────────────────────
      - alert: CPUUsageHigh
        expr: (1 - avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: skillbridge
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ printf \"%.1f\" $value }}% (threshold: 80%) for more than 5 minutes."
          dashboard_url: "http://localhost:3200/d/node-exporter/skillbridge-system-metrics"

      - alert: CPUUsageCritical
        expr: (1 - avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[10m]))) * 100 > 90
        for: 10m
        labels:
          severity: critical
          service: skillbridge
        annotations:
          summary: "Critical CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ printf \"%.1f\" $value }}% (threshold: 90%) for more than 10 minutes."
          dashboard_url: "http://localhost:3200/d/node-exporter/skillbridge-system-metrics"

      # ── Memory ───────────────────────────────────────────────────────────────
      - alert: MemoryUsageHigh
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: skillbridge
        annotations:
          summary: "High Memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ printf \"%.1f\" $value }}% (threshold: 80%)."
          dashboard_url: "http://localhost:3200/d/node-exporter/skillbridge-system-metrics"

      - alert: MemoryUsageCritical
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: critical
          service: skillbridge
        annotations:
          summary: "Critical Memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ printf \"%.1f\" $value }}% (threshold: 90%)."
          dashboard_url: "http://localhost:3200/d/node-exporter/skillbridge-system-metrics"

      # ── Disk ─────────────────────────────────────────────────────────────────
      - alert: DiskUsageHigh
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 75
        for: 5m
        labels:
          severity: warning
          service: skillbridge
        annotations:
          summary: "High Disk usage on {{ $labels.instance }}"
          description: "Disk usage on / is {{ printf \"%.1f\" $value }}% (threshold: 75%)."
          dashboard_url: "http://localhost:3200/d/node-exporter/skillbridge-system-metrics"

      - alert: DiskUsageCritical
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 90
        for: 5m
        labels:
          severity: critical
          service: skillbridge
        annotations:
          summary: "Critical Disk usage on {{ $labels.instance }}"
          description: "Disk usage on / is {{ printf \"%.1f\" $value }}% (threshold: 90%)."
          dashboard_url: "http://localhost:3200/d/node-exporter/skillbridge-system-metrics"

      # ── Uptime / Blackbox ────────────────────────────────────────────────────
      - alert: APIDown
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
          service: skillbridge
        annotations:
          summary: "SkillBridge endpoint unreachable: {{ $labels.instance }}"
          description: "Blackbox probe has been failing for {{ $labels.instance }} for more than 2 minutes. The service may be down."
          dashboard_url: "http://localhost:3200/d/blackbox-exporter/skillbridge-uptime-ssl"

      # ── SSL Certificate ───────────────────────────────────────────────────────
      - alert: SSLCertExpiryWarning
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 30
        for: 1h
        labels:
          severity: warning
          service: skillbridge
        annotations:
          summary: "SSL certificate expiring soon for {{ $labels.instance }}"
          description: "SSL certificate for {{ $labels.instance }} expires in {{ printf \"%.0f\" $value }} days."
          dashboard_url: "http://localhost:3200/d/blackbox-exporter/skillbridge-uptime-ssl"

      - alert: SSLCertExpiryCritical
        expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 7
        for: 1h
        labels:
          severity: critical
          service: skillbridge
        annotations:
          summary: "SSL certificate expiring CRITICALLY SOON for {{ $labels.instance }}"
          description: "SSL certificate for {{ $labels.instance }} expires in {{ printf \"%.0f\" $value }} days."
          dashboard_url: "http://localhost:3200/d/blackbox-exporter/skillbridge-uptime-ssl"
